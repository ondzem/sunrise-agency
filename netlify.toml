[build]
  command = "npm run build"
  publish = "dist"

# Přesměrování všech /api/* požadavků na Netlify serverless funkce
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Nastavení nezbytné pro to, aby v React aplikaci (SPA) fungovalo přesměrování stránek, 
# když uživatel napíše rovnou adresu např. /kontakt do prohlížeče.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
